apiVersion: database.oracle.com/v4
kind: SingleInstanceDatabase
metadata:
  name: truecache-production
  namespace: default
spec:

  ## DB edition
  edition: enterprise

  ## DB Type
  createAs: truecache

  ## Use a primary endpoint reachable from this cluster, for example through
  ## peered VCNs, private DNS, or another cluster-private service endpoint.
  primarySource:
    connectString: "orcl-production.internal.example.com:1521/ORCLPRD"
    pdbName: "APPPDB1"

  ## Use only alphanumeric characters for sid
  sid: ORCLPRD

  ## PDB name
  pdbName: APPPDB1

  ## Grouped security settings.
  security:
    secrets:
      admin:
        secretName: db-admin-secret
        secretKey: oracle_pwd
        keepSecret: true
      tde:
        secretName: tde-wallet-secret
        secretKey: tde_wallet_pwd
    tcps:
      enabled: true
      tlsSecret: sidb-standby-tcps-tls

  ## Database image details
  image:
    pullFrom: container-registry.oracle.com/database/enterprise:latest
    prebuiltDB: false
    imagePullPolicy: Always

  ## Storage details
  persistence:
    oradata:
      size: 60Gi
      storageClass: "oci-bv"
      accessMode: "ReadWriteOnce"

  ## Generated blob ConfigMap from the primary database.
  trueCache:
    blobConfigMapRef: orcl-production-truecache-blob
    blobConfigMapKey: tc_config_blob.tar.gz
    blobMountPath: /stage/tc_config_blob.tar.gz
    truedbUniqueName: "truecache_production_tc"
    trueCacheServices:
      - "APPPDB1:tpdb_primary:tpdb_cache"

  ## Optional operator-managed external service for the truecache database.
  ## This renders a Service named <sidb-name>-ext, for example truecache-production-ext.
  services:
    external:
      type: LoadBalancer
      externalTrafficPolicy: Local
      annotations:
        oci.oraclecloud.com/load-balancer-type: "nlb"
        oci-network-load-balancer.oraclecloud.com/internal: "true"
        oci-network-load-balancer.oraclecloud.com/subnet: "ocid1.subnet.oc1.ap-mumbai-1.replace-me"
        external-dns.alpha.kubernetes.io/hostname: "truecache-production.internal.example.com"
      tcp:
        enabled: true
        port: 1521
      tcps:
        enabled: true
        port: 2484

  ## Optional mapping for the remote primary endpoint when cluster DNS or
  ## shared-zone visibility is not available in this cluster.
  # hostAliases:
  #   - ip: "10.0.2.108"
  #     hostnames:
  #       - "orcl-production.internal.example.com"
  #       - "orcl-production"

  ## Count of Database Pods. Should be 1 for True Cache.
  replicas: 1
