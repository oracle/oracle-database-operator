apiVersion: database.oracle.com/v4
kind: SingleInstanceDatabase
metadata:
  name: orcl-production
  namespace: default
spec:
  ## Use only alphanumeric characters for sid
  sid: ORCLPRD

  ## PDB name
  pdbName: APPPDB1

  ## DB type and edition
  createAs: primary
  edition: enterprise

  ## Grouped security settings
  security:
    secrets:
      admin:
        secretName: db-admin-secret
        secretKey: oracle_pwd
        keepSecret: true
      tde:
        secretName: tde-wallet-secret
        secretKey: tde_wallet_pwd
    tcps:
      enabled: true
      tlsSecret: sidb-primary-tcps-tls

  ## Enable ArchiveLog so the operator can generate the True Cache blob
  archiveLog: true

  ## Database image details
  image:
    pullFrom: phx.ocir.io/intsanjaysingh/db-repo/oracle/database:truecache-23.26.0-ee-truecachefix-patchnew
    prebuiltDB: false
    imagePullPolicy: Always

  ## Optional init parameters
  initParams:
    sgaTarget: 2048
    pgaAggregateTarget: 1024
    cpuCount: 2
    processes: 600

  ## Database pod resource details
  resources:
    requests:
      memory: "12Gi"
      cpu: "2"
    limits:
      memory: "24Gi"
      cpu: "4"

  ## Storage details
  persistence:
    oradata:
      size: 60Gi
      storageClass: "oci-bv"
      accessMode: "ReadWriteOnce"
    setWritePermissions: true

  ## Generate the True Cache blob ConfigMap on the primary
  trueCache:
    generateEnabled: true
    generatePath: "/tmp/tc_config_blob.tar.gz"

  ## Optional external service managed by the operator.
  ## This renders a Service named <sidb-name>-ext, for example orcl-production-ext.
  services:
    external:
      type: LoadBalancer
      externalTrafficPolicy: Local
      annotations:
        oci.oraclecloud.com/load-balancer-type: "nlb"
        oci-network-load-balancer.oraclecloud.com/internal: "true"
        oci-network-load-balancer.oraclecloud.com/subnet: "ocid1.subnet.oc1.iad.replace-me"
        external-dns.alpha.kubernetes.io/hostname: "orcl-production.internal.example.com"
      tcp:
        enabled: true
        port: 1521
      tcps:
        enabled: true
        port: 2484

  ## Use hostAliases when the remote True Cache hostname resolves over peered VCNs
  ## but cross-region private DNS forwarding or association is not yet configured.
  hostAliases:
    - ip: "10.2.1.241"
      hostnames:
        - "truecache-production.internal.example.com"
        - "truecache-production"

  ## Count of Database Pods.
  replicas: 1
