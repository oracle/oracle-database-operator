apiVersion: database.oracle.com/v4
kind: SingleInstanceDatabase
metadata:
  name: truecache-sample
  namespace: default
spec:

  ## DB edition
  ## True Cache is supported only with enterprise edition.
  edition: enterprise

  ## DB type
  createAs: truecache

  ## Reference to the source primary database.
  primarySource:
    databaseRef: "orcl-production"

  ## True Cache options
  trueCache:
    ## Accepts a semi colon separated list of `PRIMARY_PDB_SERIVCE_NAME:PRIMARY_SERVICE_NAME:TRUECACHE_SERVICE_NAME`
    trueCacheServices:
    # - "APPPDB1:tpdb_primary:tpdb_cache"

  ## Optional static host-to-IP mappings added to the True Cache pod /etc/hosts
  ## Useful when the primary database service name must resolve to a fixed IP
  # hostAliases:
  #   - ip: "10.2.1.241"
  #     hostnames:
  #       - "orcl-production.internal.example.com"
  #       - "orcl-production"

  ## Grouped security settings
  security:
    secrets:
      admin:
        secretName: db-admin-secret
        secretKey: oracle_pwd
        keepSecret: true

  ## Database image details
  image:
    ## Oracle True Cache requires a True Cache capable image
    pullFrom: container-registry.oracle.com/database/enterprise:latest

  ## size is the required minimum size of the persistent volume
  ## storageClass is specified for automatic volume provisioning
  ## accessMode can only accept one of ReadWriteOnce, ReadWriteMany
  persistence:
    oradata:
      size: 50Gi
      ## oci-bv applies to OCI block volumes. Use "standard" storageClass for dynamic provisioning in Minikube. Update as appropriate for other cloud service providers
      storageClass: "oci-bv"
      accessMode: "ReadWriteOnce"

  ## Count of Database Pods. Should be 1 for True Cache.
  replicas: 1
