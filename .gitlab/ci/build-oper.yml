build-operator:
  stage: build
  variables:
    IMAGE: "$DOCKER_REPO:$CI_COMMIT_SHORT_SHA"
    OP_YAML: oracle-database-operator.yaml
    BUILD_INTERNAL: "true"
    GOLANG_VERSION: "1.26.1"
    LINT_PKGS: "./..."
  script:
    - |
      case "$(uname -m)" in
        x86_64) GOARCH=amd64 ;;
        aarch64|arm64) GOARCH=arm64 ;;
        *)
          echo "Unsupported runner architecture: $(uname -m)" >&2
          exit 1
          ;;
      esac

      if command -v go >/dev/null 2>&1 && go version | grep -q "go${GOLANG_VERSION} "; then
        export GOROOT="$(go env GOROOT)"
      else
        echo "Bootstrapping Go ${GOLANG_VERSION} for linux/${GOARCH}"
        curl -fsSL -o /tmp/go.tgz "https://go.dev/dl/go${GOLANG_VERSION}.linux-${GOARCH}.tar.gz"
        rm -rf "$(pwd)/.go"
        mkdir -p "$(pwd)/.go"
        tar -C "$(pwd)/.go" -xzf /tmp/go.tgz
        rm -f /tmp/go.tgz
        export GOROOT="$(pwd)/.go/go"
      fi

      export PATH="${GOROOT}/bin:${PATH}"
      export GOTOOLCHAIN=local
    - go version
    - go env GOTOOLCHAIN GOVERSION GOROOT

    # --------------------------------
    # Install linting tools locally
    # --------------------------------
    - echo "Installing static analysis tools..."
    - export GOBIN=$(pwd)/bin
    - mkdir -p $GOBIN
    - curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s latest
    - export PATH="$PATH:$(pwd)/bin"

    # --------------------------------
    # Run scoped Go vet
    # --------------------------------
    - echo "Running go vet on scoped packages..."
    - go vet ${LINT_PKGS} || true

    # --------------------------------
    # Run golangci-lint using repo config
    # --------------------------------
    - echo "Running golangci-lint on scoped packages..."
    - |
      golangci-lint run ${LINT_PKGS} \
        --config .golangci.yml \
        || true

    # --------------------------------
    # Existing build logic
    # --------------------------------
    - echo "Running unit tests..."
    - make test GOLANG_VERSION=$GOLANG_VERSION

    - make operator-yaml IMG=$IMAGE GOLANG_VERSION=$GOLANG_VERSION

    - |
      if [ "$CI_COMMIT_BRANCH" = "master" ]; then
        podman run --rm --privileged multiarch/qemu-user-static --reset -p yes
        make image-build image-push IMG="$IMAGE" BUILD_MANIFEST=true GOLANG_VERSION=$GOLANG_VERSION
        podman manifest rm "$IMAGE"
      else
        make image-build image-push IMG="$IMAGE" GOLANG_VERSION=$GOLANG_VERSION
        podman rmi "$IMAGE"
        sed -i "s/\(replicas.\) 3/\1 1/g" ./$OP_YAML
      fi

    - buildah containers -q | xargs -n1 buildah rm || true
    - podman system prune -f
    - curl -s --netrc-file $HOME/.netrc_gitlab $ARTIFACTORY_REPO/$CI_COMMIT_BRANCH/$OP_YAML -T ./$OP_YAML

  only:
    variables:
      - $CI_COMMIT_MESSAGE =~ /\#run-pipeline/
      - $CI_COMMIT_BRANCH =~ /master/
      - $CI_MERGE_REQUEST_ID != ""
  except:
    variables:
      - $CI_COMMIT_MESSAGE =~ /\#skip-pipeline/
      - $CI_COMMIT_TAG != null


cleanup:
  stage: .post
  script:
    - echo "Clean up downloaded binaries"
    - rm -rf bin/ .go/
