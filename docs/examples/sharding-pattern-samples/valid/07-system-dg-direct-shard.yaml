apiVersion: database.oracle.com/v4
kind: ShardingDatabase
metadata:
  name: shdb-system-direct
  namespace: shns
spec:
  storageClass: oci
  dbImage: phx.ocir.io/intsanjaysingh/db-repo/oracle/database:19.28.0.0
  gsmImage: phx.ocir.io/intsanjaysingh/db-repo/oracle/database:19.28.0.0-gsm
  shardingType: SYSTEM
  replicationType: DG
  isExternalSvc: false
  isDeleteOraPvc: true
  dbSecret:
    name: db-user-pass-rsa
    pwdFileName: pwdfile.enc
    tdePwdFileName: tdepwdfile.enc
    keyFileName: key.pem
  catalog:
    - name: catalog
      storageSizeInGb: 50
      imagePullPolicy: Always
      sharding: SYSTEM
      repl: DG
      autoVncr: OFF
      agentPort: 8080
  gsm:
    - name: gsm1
      storageSizeInGb: 50
      imagePullPolicy: Always
      region: primary
  shard:
    - name: dshard1
      shardGroup: dsg1
      cpuThreshold: 70
      diskThreshold: 15
      rack: rack-a
      force: true
      savename: true
      validateNetwork: true
