apiVersion: database.oracle.com/v4
kind: ShardingDatabase
metadata:
  name: shdb-user-native
  namespace: shns
spec:
  storageClass: oci
  dbImage: phx.ocir.io/intsanjaysingh/db-repo/oracle/database:19.28.0.0
  gsmImage: phx.ocir.io/intsanjaysingh/db-repo/oracle/database:19.28.0.0-gsm
  shardingType: USER
  replicationType: NATIVE
  isExternalSvc: false
  isDeleteOraPvc: true
  dbSecret:
    name: db-user-pass-rsa
    pwdFileName: pwdfile.enc
    tdePwdFileName: tdepwdfile.enc
    keyFileName: key.pem
  catalog:
    - name: catalog
      storageSizeInGb: 50
      imagePullPolicy: Always
      sharding: USER
      repl: NATIVE
      autoVncr: ON
      repFactor: 3
      repUnits: 1
      agentPort: 8080
  gsm:
    - name: gsm1
      storageSizeInGb: 50
      imagePullPolicy: Always
      region: primary
  shardInfo:
    - shardPreFixName: unshard
      shardNum: 1
      shape: kodb4
      storageSizeInGb: 50
      shardSpaceDetails:
        name: unspace1
        chunks: 16
  shardSpace:
    - name: unspace1
      chunks: 16
      repFactor: 3
      repUnits: 1
      protectMode: MAXPERFORMANCE
