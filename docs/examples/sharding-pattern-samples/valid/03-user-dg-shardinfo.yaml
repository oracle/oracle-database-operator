apiVersion: database.oracle.com/v4
kind: ShardingDatabase
metadata:
  name: shdb-user-dg
  namespace: shns
spec:
  storageClass: oci
  dbImage: phx.ocir.io/intsanjaysingh/db-repo/oracle/database:19.28.0.0
  gsmImage: phx.ocir.io/intsanjaysingh/db-repo/oracle/database:19.28.0.0-gsm
  shardingType: USER
  replicationType: DG
  isExternalSvc: false
  isDeleteOraPvc: true
  dbSecret:
    name: db-user-pass-rsa
    pwdFileName: pwdfile.enc
    tdePwdFileName: tdepwdfile.enc
    keyFileName: key.pem
  catalog:
    - name: catalog
      storageSizeInGb: 50
      imagePullPolicy: Always
      sharding: USER
      repl: DG
      autoVncr: OFF
      agentPort: 8080
  gsm:
    - name: gsm1
      storageSizeInGb: 50
      imagePullPolicy: Always
      region: primary
  shardInfo:
    - shardPreFixName: ushard
      shardNum: 1
      shape: kodb4
      storageSizeInGb: 50
      shardSpaceDetails:
        name: uspace1
        chunks: 12
  shardSpace:
    - name: uspace1
      chunks: 12
  gsmService:
    - name: oltp_rw_svc
      role: primary
