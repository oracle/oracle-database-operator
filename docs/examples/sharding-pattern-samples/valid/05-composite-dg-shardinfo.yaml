apiVersion: database.oracle.com/v4
kind: ShardingDatabase
metadata:
  name: shdb-composite-dg
  namespace: shns
spec:
  storageClass: oci
  dbImage: phx.ocir.io/intsanjaysingh/db-repo/oracle/database:19.28.0.0
  gsmImage: phx.ocir.io/intsanjaysingh/db-repo/oracle/database:19.28.0.0-gsm
  shardingType: COMPOSITE
  replicationType: DG
  isExternalSvc: false
  isDeleteOraPvc: true
  dbSecret:
    name: db-user-pass-rsa
    pwdFileName: pwdfile.enc
    tdePwdFileName: tdepwdfile.enc
    keyFileName: key.pem
  catalog:
    - name: catalog
      storageSizeInGb: 50
      imagePullPolicy: Always
      sharding: COMPOSITE
      repl: DG
      autoVncr: OFF
      agentPort: 8080
  gsm:
    - name: gsm1
      storageSizeInGb: 50
      imagePullPolicy: Always
      region: primary
    - name: gsm2
      storageSizeInGb: 50
      imagePullPolicy: Always
      region: standby
  shardInfo:
    - shardPreFixName: cshard
      shardNum: 1
      shape: kodb4
      storageSizeInGb: 50
      shardGroupDetails:
        name: cshg1
        region: primary
        deployAs: PRIMARY
        shardSpace: cspace1
      shardSpaceDetails:
        name: cspace1
        chunks: 12
  shardSpace:
    - name: cspace1
      chunks: 12
