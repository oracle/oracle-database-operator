apiVersion: database.oracle.com/v4
kind: ShardingDatabase
metadata:
  name: shdb-single-source
  namespace: shns
spec:
  storageClass: oci
  dbImage: phx.ocir.io/intsanjaysingh/db-repo/oracle/database:19.28.0.0
  gsmImage: phx.ocir.io/intsanjaysingh/db-repo/oracle/database:19.28.0.0-gsm
  shardingType: COMPOSITE
  # replicationType intentionally omitted -> defaults to DG
  isExternalSvc: false
  isDeleteOraPvc: true
  dbSecret:
    name: db-user-pass-rsa
    pwdFileName: pwdfile.enc
    tdePwdFileName: tdepwdfile.enc
    keyFileName: key.pem
  catalog:
    - name: catalog
      storageSizeInGb: 50
      imagePullPolicy: Always
      # sharding/repl intentionally omitted -> inherited from top-level/defaults
      autoVncr: OFF
      agentPort: 8080
  gsm:
    - name: gsm1
      storageSizeInGb: 50
      imagePullPolicy: Always
      region: primary
  shardInfo:
    - shardPreFixName: singlesh
      shardNum: 1
      shape: kodb4
      storageSizeInGb: 50
      shardGroupDetails:
        name: csg1
        region: primary
        deployAs: PRIMARY
        shardSpace: css1
      shardSpaceDetails:
        name: css1
        chunks: 12
