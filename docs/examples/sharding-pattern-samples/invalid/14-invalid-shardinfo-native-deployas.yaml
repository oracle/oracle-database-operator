apiVersion: database.oracle.com/v4
kind: ShardingDatabase
metadata:
  name: shdb-inv-shinfo-native
  namespace: shns
spec:
  storageClass: oci
  dbImage: phx.ocir.io/intsanjaysingh/db-repo/oracle/database:19.28.0.0
  gsmImage: phx.ocir.io/intsanjaysingh/db-repo/oracle/database:19.28.0.0-gsm
  shardingType: SYSTEM
  replicationType: NATIVE
  isExternalSvc: false
  isDeleteOraPvc: true
  dbSecret:
    name: db-user-pass-rsa
    pwdFileName: pwdfile.enc
    tdePwdFileName: tdepwdfile.enc
    keyFileName: key.pem
  catalog:
    - name: catalog
      storageSizeInGb: 50
      imagePullPolicy: Always
      sharding: SYSTEM
      repl: NATIVE
      autoVncr: ON
      repFactor: 3
      repUnits: 1
      agentPort: 8080
  gsm:
    - name: gsm1
      storageSizeInGb: 50
      imagePullPolicy: Always
      region: primary
  shardInfo:
    - shardPreFixName: badsh
      shardNum: 1
      shape: kodb4
      storageSizeInGb: 50
      shardGroupDetails:
        name: badsg
        region: primary
        deployAs: PRIMARY
