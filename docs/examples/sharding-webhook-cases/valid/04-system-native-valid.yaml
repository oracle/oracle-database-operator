apiVersion: database.oracle.com/v4
kind: ShardingDatabase
metadata:
  name: case-system-native-ok
  namespace: default
spec:
  dbImage: container-registry.oracle.com/database/enterprise:21.3.0.0
  gsmImage: container-registry.oracle.com/database/gsm:21.3.0.0
  dbSecret:
    name: db-secret
    pwdFileName: dbpwd
    encryptionType: base64
  catalog:
  - name: cat4
    sharding: SYSTEM
    repl: NATIVE
    autoVncr: OFF
    repFactor: 3
    repUnits: 1
    agentPort: 8080
  gsm:
  - name: gsm1
  shardingType: SYSTEM
  replicationType: NATIVE
  shardGroup:
  - name: sg1
    region: primary
    repFactor: 3
  shard:
  - name: shd1
    shardGroup: sg1
