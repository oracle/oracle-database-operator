apiVersion: database.oracle.com/v4
kind: ShardingDatabase
metadata:
  name: case-user-native-ok
  namespace: default
spec:
  dbImage: container-registry.oracle.com/database/enterprise:21.3.0.0
  gsmImage: container-registry.oracle.com/database/gsm:21.3.0.0
  dbSecret:
    name: db-secret
    pwdFileName: dbpwd
    encryptionType: base64
  catalog:
  - name: cat2
    sharding: USER
    repl: NATIVE
    autoVncr: ON
    agentPort: 8080
    repFactor: 3
    repUnits: 1
  gsm:
  - name: gsm1
  shardingType: USER
  replicationType: NATIVE
  shard:
  - name: shd1
    shardSpace: ss1
