apiVersion: database.oracle.com/v4
kind: ShardingDatabase
metadata:
  name: case-shardinfo-sys
  namespace: default
spec:
  dbImage: container-registry.oracle.com/database/enterprise:21.3.0.0
  gsmImage: container-registry.oracle.com/database/gsm:21.3.0.0
  dbSecret:
    name: db-secret
    pwdFileName: dbpwd
    encryptionType: base64
  catalog:
  - name: cat11
    sharding: SYSTEM
    repl: DG
    autoVncr: OFF
    agentPort: 8080
  gsm:
  - name: gsm1
  shardingType: SYSTEM
  replicationType: DG
  shardInfo:
  - shardPreFixName: sh
    shardNum: 1
    shardGroupDetails:
      name: sg1
      region: primary
      deployAs: PRIMARY
