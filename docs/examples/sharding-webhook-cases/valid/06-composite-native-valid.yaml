apiVersion: database.oracle.com/v4
kind: ShardingDatabase
metadata:
  name: case-composite-native-ok
  namespace: default
spec:
  dbImage: container-registry.oracle.com/database/enterprise:21.3.0.0
  gsmImage: container-registry.oracle.com/database/gsm:21.3.0.0
  dbSecret:
    name: db-secret
    pwdFileName: dbpwd
    encryptionType: base64
  catalog:
  - name: cat6
    sharding: COMPOSITE
    repl: NATIVE
    autoVncr: ON
    repFactor: 3
    repUnits: 1
    agentPort: 8080
  gsm:
  - name: gsm1
  shardingType: COMPOSITE
  replicationType: NATIVE
  shardGroup:
  - name: sg1
    region: primary
    shardSpace: ss1
    repFactor: 3
  shardSpace:
  - name: ss1
    chunks: 16
    repFactor: 3
    repUnits: 1
    protectMode: MAXPERFORMANCE
  shard:
  - name: shd1
    shardGroup: sg1
    shardSpace: ss1
